<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RMS 4-Pillar Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE_URL = window.location.origin;

        const App = () => {
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [role, setRole] = useState(localStorage.getItem('role'));
            const [projects, setProjects] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const [adapterMode, setAdapterMode] = useState('prod-sqlite');

            const apiCall = async (endpoint, method = 'GET', body = null) => {
                setError(null);
                const headers = { 'Content-Type': 'application/json', 'X-Adapter-Mode': adapterMode };
                if (token) headers['Authorization'] = `Bearer ${token}`;
                try {
                    const resp = await fetch(`${API_BASE_URL}${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : null });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.detail || 'Request failed');
                    return data;
                } catch (err) {
                    setError(err.message);
                    return null;
                }
            };

            const login = async (e) => {
                e.preventDefault();
                const data = await apiCall('/api/login', 'POST', { email: e.target.email.value });
                if (data) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    setToken(data.token); setRole(data.role);
                }
            };

            useEffect(() => {
                if (token) {
                    setProjects([]);
                    setIsLoading(true);
                    apiCall('/api/projects').then(data => { if(data) setProjects(data); setIsLoading(false); });
                }
            }, [token, adapterMode]);

            if (!token) return (
                <div className="flex items-center justify-center h-screen bg-gray-100">
                    <form onSubmit={login} className="bg-white p-10 rounded-2xl shadow-xl w-96">
                        <h2 className="text-3xl font-black mb-6 text-gray-800 border-b pb-2 tracking-tighter">RMS LOGIN</h2>
                        <input name="email" type="email" placeholder="admin@rms.com" className="w-full p-4 border rounded-xl mb-4 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" required />
                        <button className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">Login</button>
                    </form>
                </div>
            );

            return (
                <div className="p-8 max-w-4xl mx-auto">
                    <div className="bg-amber-50 p-4 mb-8 rounded-xl border border-amber-200 flex justify-between items-center shadow-sm">
                        <span className="text-amber-800 font-bold text-xs uppercase tracking-widest">Active Pillar:</span>
                        <select value={adapterMode} onChange={(e) => setAdapterMode(e.target.value)} className="p-2 border border-amber-300 rounded-lg text-xs font-bold bg-white">
                            <option value="prod-sqlite">SQLite (Reliable)</option>
                            <option value="prod-postgres">PostgreSQL (Cloud)</option>
                            <option value="dev-mock">MockDB (Simulation)</option>
                        </select>
                    </div>

                    <header className="flex justify-between items-end mb-8 border-b pb-4">
                        <h1 className="text-5xl font-black tracking-tighter text-gray-900">Research Portal</h1>
                        <button onClick={() => { localStorage.clear(); setToken(null); }} className="text-red-500 font-bold hover:underline mb-1 text-sm uppercase">Logout ({role})</button>
                    </header>

                    {error && <div className="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-r-xl mb-6 font-bold text-sm">⚠️ {error}</div>}

                    {role === 'admin' && (
                        <div className="bg-white p-6 rounded-2xl shadow-sm border mb-8">
                            <h3 className="font-black mb-4 text-gray-400 text-xs uppercase tracking-widest flex items-center gap-2">Register New Project</h3>
                            <form onSubmit={async (e) => {
                                e.preventDefault();
                                const res = await apiCall('/api/projects', 'POST', { title: e.target.title.value, researcher: e.target.res.value });
                                if (res) { setProjects(prev => [...prev, res]); e.target.reset(); }
                            }} className="flex flex-col md:flex-row gap-4">
                                <input name="title" placeholder="Title (min 5 chars)" className="flex-1 p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400" required />
                                <input name="res" placeholder="Researcher" className="p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400" required />
                                <button className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Create</button>
                            </form>
                        </div>
                    )}

                    <div className="grid gap-4">
                        <h2 className="text-xl font-bold text-gray-800">Inventory {isLoading && <span className="text-xs text-blue-500 animate-pulse ml-2">...WIRING...</span>}</h2>
                        {projects.length === 0 && !isLoading ? (
                            <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-100 italic text-gray-400">No projects in {adapterMode}.</div>
                        ) : projects.map(p => (
                            <div key={p.reference_id} className="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center hover:shadow-md transition">
                                <div><h4 className="font-bold text-xl text-gray-900">{p.title}</h4><p className="text-gray-400 text-sm">PI: {p.researcher}</p></div>
                                <span className="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase border border-blue-100">{p.status}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
