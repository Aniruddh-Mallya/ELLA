<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RMS 4-Pillar Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_BASE_URL = window.location.origin;

        // Save-to-project control shown on each search result.
        // Holds its own selected-project state so cards don't fight each other.
        const SaveToProjectControl = ({ paper, myProjects, onSave }) => {
            const [selected, setSelected] = useState('');
            if (myProjects.length === 0) {
                return <p className="text-xs text-gray-400 mt-3 italic">Create a project first to save papers.</p>;
            }
            return (
                <div className="flex gap-2 mt-3">
                    <select
                        value={selected}
                        onChange={(e) => setSelected(e.target.value)}
                        className="flex-1 p-2 border rounded-lg text-xs bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400"
                    >
                        <option value="">Save to one of my projects…</option>
                        {myProjects.map(p => <option key={p.reference_id} value={p.reference_id}>{p.title}</option>)}
                    </select>
                    <button
                        onClick={() => onSave(selected, paper)}
                        className="bg-green-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-green-700 transition shrink-0"
                    >Save</button>
                </div>
            );
        };

        const App = () => {
            const [token, setToken] = useState(localStorage.getItem('token'));
            const [role, setRole] = useState(localStorage.getItem('role'));
            const [email, setEmail] = useState(localStorage.getItem('email'));
            const [projects, setProjects] = useState([]);
            const [users, setUsers] = useState([]);
            const [papers, setPapers] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [hasSearched, setHasSearched] = useState(false);
            const [profile, setProfile] = useState(null);
            const [expandedProject, setExpandedProject] = useState(null);
            const [projectPapers, setProjectPapers] = useState({});
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);
            const [success, setSuccess] = useState(null);
            const [adapterMode, setAdapterMode] = useState('prod-postgres');
            const [activeTab, setActiveTab] = useState('projects');

            const apiCall = async (endpoint, method = 'GET', body = null) => {
                setError(null);
                setSuccess(null);
                const headers = { 'Content-Type': 'application/json', 'X-Adapter-Mode': adapterMode };
                if (token) headers['Authorization'] = `Bearer ${token}`;
                try {
                    const resp = await fetch(`${API_BASE_URL}${endpoint}`, { method, headers, body: body ? JSON.stringify(body) : null });
                    const data = await resp.json();
                    if (!resp.ok) throw new Error(data.detail || 'Request failed');
                    return data;
                } catch (err) {
                    setError(err.message);
                    return null;
                }
            };

            const login = async (e) => {
                e.preventDefault();
                const data = await apiCall('/api/login', 'POST', {
                    email: e.target.email.value,
                    password: e.target.password.value
                });
                if (data) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('email', data.email);
                    setToken(data.token); setRole(data.role); setEmail(data.email);
                }
            };

            const loadProjects = async () => {
                setIsLoading(true);
                const data = await apiCall('/api/projects');
                if (data) setProjects(data);
                setIsLoading(false);
            };

            const loadUsers = async () => {
                setIsLoading(true);
                const data = await apiCall('/api/users');
                if (data) setUsers(data);
                setIsLoading(false);
            };

            const loadProfile = async () => {
                setIsLoading(true);
                const data = await apiCall('/api/profile');
                if (data) setProfile(data);
                setIsLoading(false);
            };

            const handleUpdateProfile = async (e) => {
                e.preventDefault();
                const res = await apiCall('/api/profile', 'PUT', {
                    full_name: e.target.full_name.value,
                    institution: e.target.institution.value,
                    orcid_id: e.target.orcid_id.value,
                });
                if (res) {
                    setProfile(res);
                    setSuccess('Profile saved.');
                }
            };

            const loadProjectPapers = async (refId) => {
                const data = await apiCall(`/api/projects/${refId}/papers`);
                setProjectPapers(prev => ({ ...prev, [refId]: data || [] }));
            };

            const toggleProject = (refId) => {
                if (expandedProject === refId) { setExpandedProject(null); return; }
                setExpandedProject(refId);
                loadProjectPapers(refId);
            };

            const handleSavePaper = async (projectRefId, paper) => {
                if (!projectRefId) { setError('Pick a project first.'); return; }
                const res = await apiCall(`/api/projects/${projectRefId}/papers`, 'POST', paper);
                if (res) {
                    setSuccess(`Saved "${paper.title}" to your project.`);
                    if (expandedProject === projectRefId) loadProjectPapers(projectRefId);
                }
            };

            const handleRemovePaper = async (projectRefId, paperId) => {
                const res = await apiCall(`/api/projects/${projectRefId}/papers?paper_id=${encodeURIComponent(paperId)}`, 'DELETE');
                if (res) {
                    setSuccess('Paper removed from project.');
                    loadProjectPapers(projectRefId);
                }
            };

            useEffect(() => {
                if (token) {
                    if (activeTab === 'projects') loadProjects();
                    if (activeTab === 'search') loadProjects();  // populate the save-to-project picker
                    if (activeTab === 'users' && role === 'admin') loadUsers();
                    if (activeTab === 'profile') loadProfile();
                }
            }, [token, adapterMode, activeTab]);

            const myProjects = projects.filter(p => p.owner_email === email);

            const handleChangeRole = async (email, currentRole) => {
                const newRole = currentRole === 'admin' ? 'researcher' : 'admin';
                const res = await apiCall('/api/users/role', 'PATCH', { email, role: newRole });
                if (res) {
                    setSuccess(`Role changed: ${email} → ${newRole}`);
                    loadUsers();
                }
            };

            const handleDeleteUser = async (email) => {
                if (!confirm(`Delete user ${email}? This cannot be undone.`)) return;
                const res = await apiCall('/api/users', 'DELETE', { email });
                if (res) {
                    setSuccess(`Deleted user: ${email}`);
                    loadUsers();
                }
            };

            const handleSearchPapers = async (e) => {
                e.preventDefault();
                const q = searchQuery.trim();
                if (q.length < 2) { setError('Enter at least 2 characters to search.'); return; }
                setIsLoading(true);
                setHasSearched(true);
                const data = await apiCall(`/api/papers/search?q=${encodeURIComponent(q)}&limit=10`);
                if (data) setPapers(data); else setPapers([]);
                setIsLoading(false);
            };

            const handleCreateUser = async (e) => {
                e.preventDefault();
                const res = await apiCall('/api/users', 'POST', {
                    email: e.target.email.value,
                    password: e.target.password.value,
                    role: e.target.role.value,
                });
                if (res) {
                    setSuccess(`Created user: ${res.email} (${res.role})`);
                    e.target.reset();
                    loadUsers();
                }
            };

            if (!token) return (
                <div className="flex items-center justify-center h-screen bg-gray-100">
                    <form onSubmit={login} className="bg-white p-10 rounded-2xl shadow-xl w-96">
                        <h2 className="text-3xl font-black mb-6 text-gray-800 border-b pb-2 tracking-tighter">RMS LOGIN</h2>
                        <input name="email" type="email" placeholder="admin@rms.com" className="w-full p-4 border rounded-xl mb-4 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" required />
                        <input name="password" type="password" placeholder="Password" className="w-full p-4 border rounded-xl mb-4 bg-gray-50 outline-none focus:ring-2 focus:ring-blue-500" required />
                        <button className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">Login</button>
                        <p className="text-xs text-gray-400 mt-4 text-center">Default: admin@rms.com / admin123</p>
                    </form>
                </div>
            );

            return (
                <div className="p-8 max-w-4xl mx-auto">
                    <div className="bg-amber-50 p-4 mb-8 rounded-xl border border-amber-200 flex justify-between items-center shadow-sm">
                        <span className="text-amber-800 font-bold text-xs uppercase tracking-widest">Active Pillar:</span>
                        <select value={adapterMode} onChange={(e) => setAdapterMode(e.target.value)} className="p-2 border border-amber-300 rounded-lg text-xs font-bold bg-white">
                            <option value="prod-postgres">PostgreSQL (Local Container - Persistent)</option>
                            <option value="prod-sqlite">SQLite (Local File - Persistent)</option>
                            <option value="dev-mock">MockDB (In-Memory Simulation)</option>
                        </select>
                    </div>

                    <header className="flex justify-between items-end mb-8 border-b pb-4">
                        <h1 className="text-5xl font-black tracking-tighter text-gray-900">Research Portal</h1>
                        <button onClick={() => { localStorage.clear(); setToken(null); setRole(null); setEmail(null); }} className="text-red-500 font-bold hover:underline mb-1 text-sm uppercase">Logout ({role})</button>
                    </header>

                    {/* Tab Navigation */}
                    <div className="flex gap-1 mb-6">
                        <button
                            onClick={() => setActiveTab('projects')}
                            className={`px-6 py-2.5 rounded-xl text-sm font-bold transition ${activeTab === 'projects' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                        >Projects</button>
                        <button
                            onClick={() => setActiveTab('search')}
                            className={`px-6 py-2.5 rounded-xl text-sm font-bold transition ${activeTab === 'search' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                        >Paper Search</button>
                        <button
                            onClick={() => setActiveTab('profile')}
                            className={`px-6 py-2.5 rounded-xl text-sm font-bold transition ${activeTab === 'profile' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                        >My Profile</button>
                        {role === 'admin' && (
                            <button
                                onClick={() => setActiveTab('users')}
                                className={`px-6 py-2.5 rounded-xl text-sm font-bold transition ${activeTab === 'users' ? 'bg-blue-600 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                            >Users</button>
                        )}
                    </div>

                    {error && <div className="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded-r-xl mb-6 font-bold text-sm">{error}</div>}
                    {success && <div className="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded-r-xl mb-6 font-bold text-sm">{success}</div>}

                    {/* ========== PROJECTS TAB ========== */}
                    {activeTab === 'projects' && (
                        <>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border mb-8">
                                <h3 className="font-black mb-4 text-gray-400 text-xs uppercase tracking-widest flex items-center gap-2">Register New Project</h3>
                                <form onSubmit={async (e) => {
                                    e.preventDefault();
                                    const res = await apiCall('/api/projects', 'POST', { title: e.target.title.value });
                                    if (res) { e.target.reset(); setSuccess('Project created.'); loadProjects(); }
                                }} className="flex flex-col md:flex-row gap-4">
                                    <input name="title" placeholder="Project title (min 5 chars)" className="flex-1 p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400" required />
                                    <button className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Create</button>
                                </form>
                                <p className="text-xs text-gray-400 mt-3">This project will be owned by you, the logged-in {role}.</p>
                            </div>

                            <div className="grid gap-4">
                                <h2 className="text-xl font-bold text-gray-800">Inventory {isLoading && <span className="text-xs text-blue-500 animate-pulse ml-2">...WIRING...</span>}</h2>
                                {projects.length === 0 && !isLoading ? (
                                    <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-100 italic text-gray-400">No projects in {adapterMode}.</div>
                                ) : projects.map(p => {
                                    const isOpen = expandedProject === p.reference_id;
                                    const isOwner = p.owner_email === email;
                                    const saved = projectPapers[p.reference_id];
                                    return (
                                    <div key={p.reference_id} className="bg-white rounded-2xl border shadow-sm hover:shadow-md transition">
                                        <div onClick={() => toggleProject(p.reference_id)} className="p-5 flex justify-between items-center cursor-pointer">
                                            <div>
                                                <h4 className="font-bold text-xl text-gray-900">{isOpen ? '▾' : '▸'} {p.title}</h4>
                                                <p className="text-gray-400 text-sm">PI: {p.owner_name}{p.owner_institution ? ` · ${p.owner_institution}` : ''}</p>
                                            </div>
                                            <span className="bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full text-[10px] font-black uppercase border border-blue-100">{p.status}</span>
                                        </div>
                                        {isOpen && (
                                            <div className="border-t px-5 py-4 bg-gray-50/50 rounded-b-2xl">
                                                <h5 className="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">Saved Papers</h5>
                                                {saved === undefined ? (
                                                    <p className="text-gray-400 italic text-sm py-2">Loading…</p>
                                                ) : saved.length === 0 ? (
                                                    <p className="text-gray-400 italic text-sm py-2">No papers saved to this project yet.</p>
                                                ) : saved.map(sp => (
                                                    <div key={sp.paper_id} className="flex justify-between items-start gap-4 bg-white p-3 rounded-xl border mb-2">
                                                        <div>
                                                            <p className="font-bold text-sm text-gray-900 leading-snug">
                                                                {sp.url ? <a href={sp.url} target="_blank" rel="noreferrer" className="hover:text-blue-600 hover:underline">{sp.title}</a> : sp.title}
                                                            </p>
                                                            <p className="text-gray-500 text-xs mt-0.5">
                                                                {(sp.authors || []).slice(0, 3).join(', ')}{sp.authors && sp.authors.length > 3 ? ' et al.' : ''}
                                                                {sp.year ? ` · ${sp.year}` : ''}{sp.venue ? ` · ${sp.venue}` : ''}
                                                            </p>
                                                        </div>
                                                        {isOwner && (
                                                            <button
                                                                onClick={() => handleRemovePaper(p.reference_id, sp.paper_id)}
                                                                className="bg-red-50 text-red-600 px-3 py-1.5 rounded-lg text-xs font-bold border border-red-200 hover:bg-red-100 transition shrink-0"
                                                            >Remove</button>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    );
                                })}
                            </div>
                        </>
                    )}

                    {/* ========== PAPER SEARCH TAB (All Users) ========== */}
                    {activeTab === 'search' && (
                        <>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border mb-8">
                                <h3 className="font-black mb-4 text-gray-400 text-xs uppercase tracking-widest">Search Academic Literature (OpenAlex)</h3>
                                <form onSubmit={handleSearchPapers} className="flex flex-col md:flex-row gap-4">
                                    <input
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        placeholder="e.g. quantum computing, CRISPR, transformers"
                                        className="flex-1 p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400"
                                    />
                                    <button className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Search</button>
                                </form>
                            </div>

                            <div className="grid gap-4">
                                <h2 className="text-xl font-bold text-gray-800">Results {isLoading && <span className="text-xs text-blue-500 animate-pulse ml-2">...SEARCHING...</span>}</h2>
                                {papers.length === 0 && hasSearched && !isLoading ? (
                                    <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-100 italic text-gray-400">No papers found. Try a different query.</div>
                                ) : !hasSearched ? (
                                    <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-100 italic text-gray-400">Search 220M+ papers from the global research graph.</div>
                                ) : papers.map(p => (
                                    <div key={p.paper_id} className="bg-white p-5 rounded-2xl border shadow-sm hover:shadow-md transition">
                                        <div className="flex justify-between items-start gap-4">
                                            <h4 className="font-bold text-lg text-gray-900 leading-snug">
                                                {p.url ? <a href={p.url} target="_blank" rel="noreferrer" className="hover:text-blue-600 hover:underline">{p.title}</a> : p.title}
                                            </h4>
                                            <span className="shrink-0 bg-blue-50 text-blue-600 px-3 py-1 rounded-full text-[10px] font-black uppercase border border-blue-100">{p.citation_count} cites</span>
                                        </div>
                                        <p className="text-gray-500 text-sm mt-1">
                                            {(p.authors || []).slice(0, 4).join(', ')}{p.authors && p.authors.length > 4 ? ' et al.' : ''}
                                            {p.year ? ` · ${p.year}` : ''}{p.venue ? ` · ${p.venue}` : ''}
                                        </p>
                                        {p.abstract && <p className="text-gray-600 text-sm mt-3 line-clamp-3">{p.abstract}</p>}
                                        {p.open_access_pdf && <a href={p.open_access_pdf} target="_blank" rel="noreferrer" className="inline-block mt-3 text-xs font-bold text-green-600 hover:underline">📄 Open Access PDF</a>}
                                        <SaveToProjectControl paper={p} myProjects={myProjects} onSave={handleSavePaper} />
                                    </div>
                                ))}
                            </div>
                        </>
                    )}

                    {/* ========== MY PROFILE TAB (All Users) ========== */}
                    {activeTab === 'profile' && (
                        <div className="bg-white p-8 rounded-2xl shadow-sm border max-w-2xl">
                            <h3 className="font-black mb-1 text-gray-800 text-2xl tracking-tight">My Profile</h3>
                            <p className="text-gray-400 text-sm mb-6">Only you can edit this — not even an admin can change it for you.</p>
                            {!profile ? (
                                <div className="italic text-gray-400 py-10">Loading profile…</div>
                            ) : (
                                <form key={profile.email} onSubmit={handleUpdateProfile} className="grid gap-5">
                                    <div className="grid md:grid-cols-2 gap-5">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Email</label>
                                            <input value={profile.email} disabled className="w-full p-3 border rounded-xl bg-gray-100 text-gray-500" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Role</label>
                                            <input value={profile.role} disabled className="w-full p-3 border rounded-xl bg-gray-100 text-gray-500 capitalize" />
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Full Name <span className="text-red-400">*</span></label>
                                        <input name="full_name" defaultValue={profile.full_name || ''} placeholder="e.g. Ada Lovelace" required className="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Institution <span className="text-gray-300">(optional)</span></label>
                                        <input name="institution" defaultValue={profile.institution || ''} placeholder="e.g. University of Cambridge" className="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">ORCID iD <span className="text-gray-300">(optional)</span></label>
                                        <input name="orcid_id" defaultValue={profile.orcid_id || ''} placeholder="0000-0002-1825-0097" className="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400" />
                                    </div>
                                    <div>
                                        <button className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Save Profile</button>
                                    </div>
                                </form>
                            )}
                        </div>
                    )}

                    {/* ========== USERS TAB (Admin Only) ========== */}
                    {activeTab === 'users' && role === 'admin' && (
                        <>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border mb-8">
                                <h3 className="font-black mb-4 text-gray-400 text-xs uppercase tracking-widest">Create New User</h3>
                                <form onSubmit={handleCreateUser} className="flex flex-col md:flex-row gap-4">
                                    <input name="email" type="email" placeholder="Email" className="flex-1 p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400" required />
                                    <input name="password" type="password" placeholder="Password (min 6)" className="p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400" required />
                                    <select name="role" className="p-3 border rounded-xl bg-gray-50 outline-none focus:ring-2 focus:ring-blue-400 font-bold text-sm">
                                        <option value="researcher">Researcher</option>
                                        <option value="admin">Admin</option>
                                    </select>
                                    <button className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition">Create</button>
                                </form>
                            </div>

                            <div className="grid gap-4">
                                <h2 className="text-xl font-bold text-gray-800">User Directory {isLoading && <span className="text-xs text-blue-500 animate-pulse ml-2">...LOADING...</span>}</h2>
                                {users.length === 0 && !isLoading ? (
                                    <div className="text-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-100 italic text-gray-400">No users found.</div>
                                ) : users.map(u => (
                                    <div key={u.email} className="bg-white p-5 rounded-2xl border shadow-sm flex justify-between items-center hover:shadow-md transition">
                                        <div>
                                            <h4 className="font-bold text-xl text-gray-900">{u.email}</h4>
                                            <span className={`text-xs font-black uppercase tracking-wider ${u.role === 'admin' ? 'text-purple-600' : 'text-blue-500'}`}>{u.role}</span>
                                        </div>
                                        <div className="flex gap-2">
                                            <button
                                                onClick={() => handleChangeRole(u.email, u.role)}
                                                className="bg-amber-50 text-amber-700 px-4 py-2 rounded-xl text-xs font-bold border border-amber-200 hover:bg-amber-100 transition"
                                            >{u.role === 'admin' ? 'Demote' : 'Promote'}</button>
                                            <button
                                                onClick={() => handleDeleteUser(u.email)}
                                                className="bg-red-50 text-red-600 px-4 py-2 rounded-xl text-xs font-bold border border-red-200 hover:bg-red-100 transition"
                                            >Delete</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
